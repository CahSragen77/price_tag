<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Cetak Pricetag AmandaMart (SCANABLE)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <!-- Tambahan Library untuk Scan Kamera HP -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .btn-print { background-color: #007bff; }
        .btn-print:hover { background-color: #0056b3; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; }
        .col { flex: 1; min-width: 250px; }
        
        /* Style Tambahan untuk Status Koneksi & Scanner */
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .online { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .offline { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #scanner-container { width: 100%; max-width: 400px; margin: 10px auto; display: none; border: 2px dashed #007bff; padding: 10px; border-radius: 8px; background: #fff; }
        
        /* --- STYLE KHUSUS UNTUK CETAK (PRINT CSS) --- */
        @media print {
            body { margin: 0; padding: 0; background: white; }
            .container, .row, .col, .form-group, button, h2, #uploadArea, .status-badge, #scanner-container { display: none !important; }
            
            #printArea { display: block !important; width: 100%; margin: 0; padding: 0; }
            .pricetag-wrapper { display: flex; flex-wrap: wrap; justify-content: flex-start; page-break-after: avoid; }
            
            .pricetag-lg, .pricetag-sm {
                margin: 2px;
                padding: 3px 5px 0px 5px;
                box-sizing: border-box;
                position: relative;
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                page-break-inside: avoid;
                border: 1px solid #000;
                border-radius: 6px !important;
                -webkit-print-color-adjust: exact; 
            }

            .pricetag-lg { width: 6.4cm; height: 3.5cm; }
            .pricetag-sm { width: 3.9cm; height: 3.5cm; }

            /* --- NAMA BARANG --- */
            .p-top { 
                text-align: center; 
                font-size: 10px; 
                line-height: 1.15; 
                font-weight: bold;
                height: 22%;
                display: flex;
                align-items: center;
                justify-content: center;
                word-wrap: break-word;
                padding: 0 2px;
            }
            .p-top-sm { font-size: 8px; height: 20%; line-height: 1.1; }

            /* --- HARGA DAN SATUAN --- */
            .p-harga { 
                font-weight: 900; 
                font-size: 26px; 
                text-align: center; 
                height: 28%;
                display: flex;
                align-items: center;
                justify-content: center;
                letter-spacing: -1px;
                padding: 2px 0;
            }
            .p-harga-sm { font-size: 18px; height: 25%; } 
            .p-satuan { font-size: 14px; font-weight: bold; margin-left: 3px; }
            .p-satuan-sm { font-size: 11px; }

            /* --- BARCODE ASLI --- */
            .p-barcode-area { 
                height: 28%; 
                display: flex; 
                flex-direction: row; 
                align-items: center; 
                padding: 0 2px;
                margin-bottom: 1px;
            }
            
            .p-barcode-wrap {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center; 
            }
            
            .p-barcode-wrap svg { 
                width: 100%; 
                height: 28px !important; 
                display: block; 
                max-width: 100%;
            }
            .p-barcode-text { font-size: 8.5px; letter-spacing: 0.5px; text-align: center; margin-top: 0px; }

            /* --- LOGO (Hanya untuk Besar) --- */
            .p-logo-area {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 35px;
                margin-left: 2px;
            }
            .p-logo-svg { width: 25px; height: auto; fill: #00a2e8; }
            .p-logo-text { font-size: 4.5px; color: #00a2e8; font-weight: bold; text-align: center; line-height: 1; margin-top: -2px; }
            
            /* --- GARIS --- */
            .p-strip-container { width: 100%; display: flex; flex-direction: column; height: 12%; justify-content: flex-end; }
            .p-line-blue { height: 3mm; background-color: #00a2e8; width: 100%; }
            .p-gap { height: 1mm; width: 100%; } 
            .p-line-red { height: 3mm; background-color: #ed1c24; width: 100%; }
            
            /* --- FOOTER --- */
            .p-bottom-text { 
                display: flex; justify-content: space-between; 
                font-size: 7.5px; 
                padding: 1px 2px 0 2px; 
                color: #000;
                font-weight: bold;
                height: 10%;
                align-items: flex-end;
            }
            .p-date { text-align: right; }

            /* --- ATURAN KHUSUS LABEL KECIL --- */
            .pricetag-sm .p-logo-area { display: none !important; }
            .pricetag-sm .p-barcode-wrap { width: 100%; } 
            .pricetag-sm .p-bottom-text { font-size: 6.5px; }
        }

        #printArea { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Mesin Cetak Pricetag (Support LoMag Excel & Cloud Sync)</h2>
        
        <!-- Indikator Koneksi & Opsi Google Sheets -->
        <div class="row" style="margin-bottom: 10px;">
            <div class="col">
                <div id="connectionStatus" class="status-badge online">Status: Mengecek Koneksi...</div>
                <div class="form-group">
                    <label>URL Web App Google Sheet (Deployment URL)</label>
                    <input type="text" id="sheetsUrlInput" placeholder="Masukkan URL Google Apps Script Web App Anda" onchange="saveConfig()">
                </div>
                <button onclick="fetchOnlineData()" style="background-color: #17a2b8; margin-top:0;">🔄 Sinkronisasi Google Sheet</button>
                <button id="btnUploadManual" onclick="uploadLocalToOnline()" style="background-color: #fd7e14; margin-top:0; display:none;">📤 Upload Manual Data Lokal ke Sheet</button>
            </div>
        </div>
        <hr>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>Pilih Ukuran Label</label>
                    <select id="sizeSelect">
                        <option value="lg">Pricetag Besar (6.4 x 3.5 cm)</option>
                        <option value="sm">Pricetag Kecil (3.9 x 3.5 cm)</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>Batas Penarikan (Opsional)</label>
                    <input type="text" id="expiryInput" value="R_H-3 MONTH" placeholder="Contoh: R_H-3 MONTH">
                </div>
            </div>
        </div>

        <div id="uploadArea">
            <div class="form-group">
                <label>1. Upload Data Master (Excel .xlsx - Offline Backup)</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls">
                <div style="font-size: 12px; color: #666;">File harga jual produk (Kunci: Barcode, Desc Name, HJ-MM, Unit)</div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label>2. Cari Manual / Scan Barcode</label>
                        <input type="text" id="manualBarcode" placeholder="Scan / Ketik Barcode Disini" onkeypress="if(event.key === 'Enter') searchBarcode()">
                        <button onclick="searchBarcode()">Tambah ke Daftar Cetak</button>
                        <!-- Tombol Aktifkan Kamera HP -->
                        <button onclick="toggleScanner()" style="background-color: #6f42c1;">📷 Aktifkan Kamera Scanner (HP)</button>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label>3. Upload File Excel LoMag (Barcode di kolom pertama)</label>
                        <input type="file" id="listBarcodeInput" accept=".xlsx, .xls">
                        <div style="font-size: 12px; color: #666;">Otomatis membaca kolom "Item code" atau kolom pertama.</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Area Video Viewfinder untuk Scanner HP -->
        <div id="scanner-container">
            <div id="interactive-reader" style="width: 100%;"></div>
            <button onclick="toggleScanner()" style="background-color: #dc3545; width: 100%; margin-top: 5px;">Tutup Kamera</button>
        </div>

        <div class="form-group">
            <label>Daftar Barcode Siap Cetak:</label>
            <textarea id="queueList" rows="4" style="width: 100%; background: #f9f9f9; font-family: monospace;" readonly></textarea>
        </div>

        <button class="btn-print" onclick="preparePrint()">🖨️ Cetak / Print PDF</button>
        <button onclick="clearQueue()" style="background-color: #dc3545;">Hapus Antrian</button>
    </div>

    <div id="printArea"></div>

    <script>
        let masterData = [];
        let printQueue = [];
        let isOnline = true;
        let html5QrcodeScanner = null;

        // Load Konfigurasi URL Google Sheets dari Browser Storage jika ada
        window.onload = function() {
            if (localStorage.getItem('sheetsUrl')) {
                document.getElementById('sheetsUrlInput').value = localStorage.getItem('sheetsUrl');
            }
            checkNetworkStatus();
            fetchOnlineData();
        };

        function saveConfig() {
            localStorage.setItem('sheetsUrl', document.getElementById('sheetsUrlInput').value.trim());
        }

        // --- Cek Status Jaringan ---
        function checkNetworkStatus() {
            const statusBadge = document.getElementById('connectionStatus');
            const btnUpload = document.getElementById('btnUploadManual');
            
            if (navigator.onLine) {
                isOnline = true;
                statusBadge.innerText = "Status: Online (Terhubung Internet)";
                statusBadge.className = "status-badge online";
                if(masterData.length > 0) {
                    btnUpload.style.display = 'inline-block';
                }
            } else {
                isOnline = false;
                statusBadge.innerText = "Status: Offline (Koneksi Terputus)";
                statusBadge.className = "status-badge offline";
                btnUpload.style.display = 'none';
                console.log("Koneksi internet terputus. Sistem otomatis menggunakan data lokal offline.");
            }
        }

        window.addEventListener('online', checkNetworkStatus);
        window.addEventListener('offline', checkNetworkStatus);

        // --- Ambil Data dari Google Sheet secara Online ---
        function fetchOnlineData() {
            checkNetworkStatus();
            const url = document.getElementById('sheetsUrlInput').value.trim();
            if (!url) return;

            if (!isOnline) {
                alert("Anda sedang offline. Tidak dapat melakukan sinkronisasi dengan Google Sheet.");
                return;
            }

            fetch(url + "?action=read")
            .then(response => response.json())
            .then(data => {
                if(data && data.length > 0) {
                    masterData = data.map(item => ({
                        barcode: String(item.barcode).trim(),
                        desc: String(item.desc).trim(),
                        price: parseFloat(item.price) || 0,
                        unit: String(item.unit || 'PCS').trim()
                    }));
                    alert(`Berhasil sinkronisasi! ${masterData.length} data dimuat dari Google Sheet secara Online.`);
                }
            })
            .catch(err => {
                console.error("Gagal mengambil data dari Google Sheet: ", err);
                alert("Gagal sinkronisasi dengan Google Sheet. Pastikan URL Web App benar dan sudah di-Deploy sebagai 'Anyone'.");
            });
        }

        // --- Upload Manual Data Lokal ke Google Sheet ---
        function uploadLocalToOnline() {
            checkNetworkStatus();
            const url = document.getElementById('sheetsUrlInput').value.trim();
            if (!url) return alert("Masukkan URL Web App Google Sheet terlebih dahulu!");
            if (!isOnline) return alert("Tidak ada koneksi internet untuk mengunggah!");
            if (masterData.length === 0) return alert("Tidak ada data lokal yang bisa diupload.");

            if(confirm(`Apakah Anda ingin mengunggah ${masterData.length} data lokal saat ini ke Google Sheet?`)) {
                fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'write', data: masterData })
                })
                .then(() => {
                    alert("Proses kirim data lokal selesai! Silakan periksa Google Sheet Anda.");
                })
                .catch(err => {
                    alert("Gagal mengunggah data lokal.");
                    console.error(err);
                });
            }
        }

        // --- FITUR BARU: CAMERA SCANNER HP (KAMERA BELAKANG) ---
        function toggleScanner() {
            const container = document.getElementById('scanner-container');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
                
                html5QrcodeScanner = new Html5Qrcode("interactive-reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, // Paksa Kamera Belakang HP
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 150 }
                    },
                    (decodedText) => {
                        // Jika barcode terdeteksi
                        document.getElementById('manualBarcode').value = decodedText;
                        searchBarcode();
                        
                        // Efek Audio Bip Ringan saat berhasil scan
                        try {
                            let context = new (window.AudioContext || window.webkitAudioContext)();
                            let osc = context.createOscillator();
                            osc.type = "sine";
                            osc.frequency.value = 1200;
                            osc.connect(context.destination);
                            osc.start();
                            setTimeout(() => osc.stop(), 100);
                        } catch(e){}
                    },
                    (errorMessage) => { /* Silently ignore error scanning */ }
                ).catch(err => {
                    alert("Gagal mengakses kamera belakang.");
                    console.error(err);
                    container.style.display = 'none';
                });
            } else {
                container.style.display = 'none';
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => {
                        html5QrcodeScanner = null;
                    });
                }
            }
        }

        // --- 1. Baca Data Master (Excel Harga - OFFLINE BACKUP) ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[firstSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                masterData = [];
                rows.forEach(row => {
                    let barcode = row['Barcode'] || row['BARCODE'];
                    let desc = row['Desc Name'] || row['NAMA BARANG'];
                    let unit = row['Unit'] || row['Satuan'] || 'PCS';
                    let price = 0;
                    
                    if (row['HJ-MM'] && row['HJ-MM'] !== 0) {
                        price = row['HJ-MM'];
                    } else if (row['NEW RETAIL PRICE HJ MM']) {
                        price = row['NEW RETAIL PRICE HJ MM'];
                    }

                    if (barcode && desc) {
                        masterData.push({
                            barcode: String(barcode).trim(),
                            desc: String(desc).trim(),
                            price: parseFloat(price) || 0,
                            unit: String(unit).trim()
                        });
                    }
                });
                alert(`Berhasil memuat ${masterData.length} data dari Excel Master Lokal!`);
                checkNetworkStatus();
            };
            reader.readAsArrayBuffer(file);
        });

        // --- 2. Upload File LoMag ---
        document.getElementById('listBarcodeInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[firstSheetName];
                    const rows = XLSX.utils.sheet_to_json(sheet);
                    
                    let addedCount = 0;
                    rows.forEach(row => {
                        let bc = row['Barcode'] || row['BARCODE'] || row['Item code'] || row['Item Code'];
                        
                        if (!bc) {
                            const keys = Object.keys(row);
                            if (keys.length > 0) {
                                bc = row[keys[0]];
                            }
                        }

                        if (bc) {
                            const item = findItem(String(bc).trim());
                            if (item) {
                                printQueue.push(item);
                                addedCount++;
                            }
                        }
                    });
                    
                    updateQueueDisplay();
                    alert(`Berhasil menambahkan ${addedCount} item dari file Excel LoMag.`);
                } catch (err) {
                    alert("Gagal membaca file Excel. Pastikan formatnya .xls/.xlsx.");
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // --- 3. Input Manual ---
        function searchBarcode() {
            const input = document.getElementById('manualBarcode');
            const bc = input.value.trim();
            if (!bc) return alert('Masukkan Barcode!');
            const item = findItem(bc);
            if (item) {
                printQueue.push(item);
                updateQueueDisplay();
                input.value = '';
            } else {
                alert(`Barcode ${bc} tidak ditemukan di Data Master!`);
            }
        }

        function findItem(barcode) { return masterData.find(item => item.barcode === barcode); }

        function updateQueueDisplay() {
            const queue = document.getElementById('queueList');
            queue.value = printQueue.map(item => `${item.barcode} - ${item.desc}`).join('\n');
        }

        function clearQueue() {
            printQueue = [];
            updateQueueDisplay();
            document.getElementById('printArea').innerHTML = '';
        }

        // --- 4. Generate Print ---
        function preparePrint() {
            if (printQueue.length === 0) return alert('Antrian kosong!');
            if (masterData.length === 0) return alert('Data Excel Master belum diload!');

            const size = document.getElementById('sizeSelect').value;
            const expiryText = document.getElementById('expiryInput').value.trim() || 'R_H-3 MONTH';
            const today = new Date();
            const dateStr = today.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/ /g, '-');

            let htmlContent = `<div class="pricetag-wrapper">`;

            printQueue.forEach(item => {
                const className = size === 'lg' ? 'pricetag-lg' : 'pricetag-sm';
                const priceStr = `Rp. ${item.price.toLocaleString('id-ID')}`;

                htmlContent += `
                    <div class="${className}">
                        <div class="p-top ${size === 'sm' ? 'p-top-sm' : ''}">
                            ${item.desc}
                        </div>
                        <div class="p-harga ${size === 'sm' ? 'p-harga-sm' : ''}">
                            ${priceStr} <span class="p-satuan ${size === 'sm' ? 'p-satuan-sm' : ''}">/ ${item.unit}</span>
                        </div>
                        
                        <div class="p-barcode-area">
                            <div class="p-barcode-wrap">
                                <svg class="barcode-js" data-barcode="${item.barcode}"></svg>
                                <div class="p-barcode-text">${item.barcode}</div>
                            </div>
                            ${size === 'lg' ? `
                            <div class="p-logo-area">
                                <svg class="p-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="50" cy="50" r="45" stroke="#00a2e8" stroke-width="5" fill="white"/>
                                    <path d="M30 40 H70 V45 H55 V75 H45 V45 H30 Z" fill="#00a2e8"/> 
                                    <rect x="30" y="55" width="40" height="10" fill="#00a2e8"/>
                                </svg>
                                <div class="p-logo-text">amanda<br>mart</div>
                            </div>
                            ` : ''}
                        </div>

                        <div class="p-strip-container">
                            <div class="p-bottom-text">
                                <div class="p-left">${expiryText}</div>
                                <div class="p-date">${dateStr}</div>
                            </div>
                            <div class="p-line-blue"></div>
                            <div class="p-gap"></div>
                            <div class="p-line-red"></div>
                        </div>
                    </div>
                `;
            });

            htmlContent += `</div>`;
            
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = htmlContent;

            setTimeout(() => {
                const svgs = printArea.querySelectorAll('.barcode-js');
                svgs.forEach(svg => {
                    const barcodeValue = svg.getAttribute('data-barcode');
                    try {
                        JsBarcode(svg, barcodeValue, {
                            format: "CODE128",
                            width: 2,
                            height: 28,
                            displayValue: false,
                            margin: 0
                        });
                    } catch (err) {
                        console.warn("Gagal barcode:", barcodeValue);
                    }
                });
                
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
